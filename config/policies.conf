# PrivDNS Gateway — 策略映射
# 安装路径: /etc/pdg/policies.conf
#
# 把 rules.conf 里的 POLICY 名映射到一个【出口 tag】。
# 出口 tag 必须是:
#   - pdg.conf 中 [outbounds.*] 定义的远程出口 (如 hk-ss2022 / tw-ss2022), 或
#   - 内置出口: direct (客户端/JP 直连) / block (拒绝)
#
# 出口的 DNS 行为 (是否返回 JP 内网 IP) 由 pdg.conf 的 dns_mode 决定:
#   spoof  → DNS 返回 JP 唯一内网 IP, 流量进 JP 再分流  (远程出口 + jp 默认)
#   direct → DNS 返回真实 IP, 手机直接访问, 不经 JP
#   block  → NXDOMAIN
#
# 格式: 策略名 = 出口tag

AI          = tw-ss2022
Binance     = tw-ss2022

YouTube     = hk-ss2022
Netflix     = hk-ss2022
Disney+     = hk-ss2022
Spotify     = hk-ss2022
TikTok      = hk-ss2022
GlobalMedia = hk-ss2022

BiliBili    = direct
ChinaMedia  = direct
Apple       = jp

# 兜底: 默认流量走 JP (进 JP, 由 JP 自身 IP 出网)
Final       = jp
