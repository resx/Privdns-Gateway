# PrivDNS Gateway — 主配置 (TOML)
# 安装路径: /etc/pdg/pdg.conf
# 由 Python 3.11 tomllib 解析。

[gateway]
# 【核心】DNS 对所有需要代理的域名统一返回这一个内网 IP。
# 手机连到这里, JP sing-box 透明入口 sniff SNI/Host 后再分流。
# 改成 JP 机上手机能访问到的那个唯一内网地址。
jp_internal_ip = "10.0.0.1"
http_port = 80
https_port = 443

[dns]
# dnsdist 对外加密 DNS 端口
dot_port = 853          # Android Private DNS (DoT)
doh_port = 8443         # iOS DoH
# DIRECT 域名走的上游递归解析器 (返回真实 IP)
upstream = ["1.1.1.1", "8.8.8.8"]
# 被 spoof 的 (代理) 域名的应答 TTL — 短一点, 改规则后快速生效
spoof_ttl = 120
# 代理域名屏蔽 AAAA / HTTPS(SVCB), 避免 IPv6 / ECH / QUIC 绕过
proxy_block_aaaa = true
proxy_block_https = true

# dnsdist DoT/DoH 用的证书 (主 dnsdist.conf 里引用, 这里仅记录)
tls_cert = "/etc/pdg/tls/fullchain.pem"
tls_key  = "/etc/pdg/tls/privkey.pem"
dns_hostname = "dns.example.com"

# ── 出口定义 ────────────────────────────────────────────────
# 远程 SS2022 落地出口。method / password / port 必须和 HK/TW 服务端一致。
[outbounds.hk-ss2022]
type = "shadowsocks"
server = "HK_IP_OR_DOMAIN"
server_port = 12345
method = "2022-blake3-aes-256-gcm"
password = "HK_PASSWORD"
dns_mode = "spoof"     # 进 JP → HK 出口

[outbounds.tw-ss2022]
type = "shadowsocks"
server = "TW_IP_OR_DOMAIN"
server_port = 12345
method = "2022-blake3-aes-256-gcm"
password = "TW_PASSWORD"
dns_mode = "spoof"     # 进 JP → TW 出口

# 内置出口 direct / block / jp 无需声明。其默认 dns_mode:
#   direct = direct, block = block, jp = spoof
# 若不想默认全量走 JP (full-tunnel), 把 policies.conf 的 Final 改成 direct,
# 或在下方 [dns_modes] 里把 jp 覆盖为 direct。
[dns_modes]
jp = "spoof"
