-- PrivDNS Gateway — dnsdist 主配置样例
-- 安装路径: /etc/dnsdist/dnsdist.conf
-- 这是【手工维护】的部分 (监听/证书/上游)。规则部分由 pdg 生成并在末尾 dofile 引入。

-- ACL: 允许哪些客户端使用本 DNS。生产建议收窄到你的客户端网段, 不要长期对全网开放。
setACL({"0.0.0.0/0", "::/0"})

-- 上游递归解析器: 处理 DIRECT 域名与未命中规则的查询 (返回真实 IP)。
newServer({address = "1.1.1.1:53"})
newServer({address = "8.8.8.8:53"})

-- 控制台 (可选, 仅本机)
-- controlSocket("127.0.0.1:5199")

-- ── 客户端入口 (加密 DNS) ────────────────────────────────
-- Android Private DNS (DoT) — 853
addTLSLocal("0.0.0.0:853",
            "/etc/pdg/tls/fullchain.pem",
            "/etc/pdg/tls/privkey.pem")

-- iOS DoH — 8443 (与 sing-box 流量入口 443 错开端口, 避免抢占)
addDOHLocal("0.0.0.0:8443",
            "/etc/pdg/tls/fullchain.pem",
            "/etc/pdg/tls/privkey.pem",
            {"/dns-query"})

-- ── 由 pdg 生成的 spoof / block 规则 (放在 server 之后) ──
-- 命中代理域名 → 应答 JP 唯一内网 IP; block → NXDOMAIN; 其余 → 上游真实 IP。
dofile("/etc/dnsdist/pdg-generated.lua")
