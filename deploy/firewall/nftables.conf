#!/usr/sbin/nft -f
# PrivDNS Gateway 防火墙 —— 只用独立表 inet pdg, 不 flush 全局(不动 Docker/fail2ban/WireGuard 等其它表)。
# install.sh 渲染占位符:
#   __SSH_PORT__      SSH 端口 (跟 sshd 的 Port 一致, 否则一应用即锁死)
#   __INTERNAL_CIDR__ 内网卡来源段(仅用于首次 IP 白名单登记和数据入口)
# 这是 default-drop 白名单, 面向"专用网关机": 对全网只留 SSH; 53/853/9443 仅放行已登记的 pdg_dns_panel_hosts。
# (8111 = iOS 描述文件下载; 9443 = 带令牌认证的 HTTPS 管理端; 5228-5230 = GMS/FCM 推送 mtalk.google.com 原生端口;
#  不开则被劫持的 mtalk 静默不通, 客户端傻等 TCP 重传, 回落慢的手机表现为"Google 服务连不上"。)
# (与其它需要入站端口的服务共存时, 把其端口加进下面白名单。本机自身 DNS 走 lo 不受影响。)
# 先 declare 再 delete: 只重建本表、不碰其它表, 故不用 `flush ruleset`。
table inet pdg
delete table inet pdg

table inet pdg {
    set pdg_dns_panel_hosts {
        type ipv4_addr
    }

    chain input {
        type filter hook input priority 0; policy drop;
        iif "lo" accept
        ip saddr != @pdg_dns_panel_hosts tcp dport { 53, 853, 9443 } drop
        ip saddr != @pdg_dns_panel_hosts udp dport 53 drop
        ip saddr @pdg_dns_panel_hosts tcp dport { 53, 853, 9443 } accept
        ip saddr @pdg_dns_panel_hosts udp dport 53 accept
        ct state established,related accept
        tcp dport { __SSH_PORT__ } accept
        ip saddr __INTERNAL_CIDR__ tcp dport { 80, 81, 443, 8111, 5228-5230, 8445 } accept
        ip saddr __INTERNAL_CIDR__ udp dport 443 reject   # QUIC/HTTP3: 拒掉, 逼客户端回落 TCP 443(可嗅 SNI 分流); 也避免 UDP 443 进 sing-box 自环
        ip protocol icmp accept
        ip6 nexthdr icmpv6 accept
    }
}
