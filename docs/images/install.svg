<svg viewBox="0 0 540 200" width="540" height="200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="一键安装终端输出示意">
<title>一键安装</title>
<rect x="0" y="0" width="540" height="200" rx="8" fill="#1b1b1b"/>
<rect x="0" y="0" width="540" height="22" rx="8" fill="#2b2b2b"/><rect x="0" y="14" width="540" height="8" fill="#2b2b2b"/>
<circle cx="14" cy="11" r="4" fill="#ff5f56"/><circle cx="28" cy="11" r="4" fill="#ffbd2e"/><circle cx="42" cy="11" r="4" fill="#27c93f"/>
<g font-family="monospace" font-size="11">
<text x="12" y="44" fill="#d8d8d8">root@vps:~# <tspan fill="#9cdcfe">curl -fsSL https://raw.githubusercontent.com/resx/Privdns-Gateway/main/install.sh | sudo bash</tspan></text>
<text x="12" y="66" fill="#c7d4e0">[*] 未在仓库目录内运行 → 自动拉取 privdns-gateway…</text>
<text x="12" y="84" fill="#c7d4e0">[*] 安装依赖…</text>
<text x="12" y="102" fill="#c7d4e0">[*] 下载 mosdns v5.3.4 (amd64)…</text>
<text x="12" y="120" fill="#c7d4e0">[*] 下载 sing-box 1.12.9 (amd64)…</text>
<text x="12" y="138" fill="#c7d4e0">[*] 识别内网卡来源段(抓包 ~90s)…  抓到: 172.22.0.0/16</text>
<text x="12" y="156" fill="#c7d4e0">[*] 签发 DoT 证书 / 起服务 / 应用防火墙…</text>
<text x="12" y="178" fill="#5fd35f">[*] 安装完成。手机私密 DNS 填: dot.example.com</text>
</g>
</svg>
